version: "1.2"
kind: "sage_agent_prompt_template"

agent:
  name: "{{AGENT_NAME}}"
  role: "{{AGENT_ROLE}}"
  authority: "SAGE"
  enforce_canon: true
  refuse_on_conflict: true
  require_machine_readable_outputs: true
  emit_no_code_on_conflict: true

sage:
  root: ".sage"

  authoritative_paths:
    - ".sage/.docs"
    - ".sage/canon"
    - ".sage/canon/ARCHITECTURE_INDEX.md"

  precedence_source: ".sage/canon/ARCHITECTURE_INDEX.md"

  dual_layer_governance: true

  layers:
    narrative: ".sage/.docs"
    machine: ".sage/canon"

  canon_authoritative: true
  markdown_descriptive_only: true

task_artifacts:
  root: ".sage/.jtasks"
  stage: "stage-<n>"
  stage_directory_pattern: "stage-<n>"
  filename_pattern: "<artifact-type>-<iso-run>.<ext>"

  stage_outputs:
    discuss:
      output_directory: ".sage/.jtasks/stage-<n>/"
      generated_artifacts:
        - "discussion-<iso-run>.yaml"

    planning:
      output_directory: ".sage/.jtasks/stage-<n>/"
      generated_artifacts:
        - "planning-<iso-run>.yaml"

    deep_governance:
      output_directory: ".sage/.jtasks/stage-<n>/"
      generated_artifacts:
        - "governance-<iso-run>.yaml"

    spec:
      output_directory: ".sage/.jtasks/stage-<n>/"
      generated_artifacts:
        - "context_manifest-<iso-run>.yaml"
        - "requirements-<iso-run>.yaml"
        - "design-<iso-run>.yaml"
        - "tasks-<iso-run>.yaml"

    execution:
      output_directory: ".sage/.jtasks/stage-<n>/"
      consumes:
        - "tasks-<iso-run>.yaml"
      may_generate:
        - "GAP_REPORT-<iso-run>.md"

task:
  classification:
    source: ".sage/canon/task_groups.yaml"

  decomposition:
    enabled: true
    deterministic: true
    steps: 5

  reviewability:
    allow_stage_reference: true
    examples:
      - "review stage-1"
      - "continue from stage-2"
      - "compare stage-1 and stage-2"

  required_checks:
    - architecture_validation
    - security_validation
    - component_identification
    - skill_lookup

validation:
  required_documents:
    - ".sage/canon/ARCHITECTURE_RULES.md"
    - ".sage/canon/SECURITY_MODEL.md"

  enforce_machine_invariants: true
  enforce_architectural_boundaries: true
  prefer_repo_evidence_over_assumptions: true

skills:
  root: ".sage/skills"

  behavior:
    load_matching_skill: true
    ignore_if_conflicts_with_higher_authority: true
    refuse_on_skill_conflict: true

modes:
  source_of_truth: ".sage/canon/rules/modes/modes_contract.yaml"
  reference_doc: ".sage/agents/{{AGENT_NAME}}/modes.md"

  precedence:
    - DEEP_GOVERNANCE
    - SPEC
    - EXEC
    - PLANNING
    - DISCUSS

  invocation_tokens:
    DISCUSS: "ENTER_DISCUSS_MODE"
    PLANNING: "ENTER_PLANNING_MODE"
    DEEP_GOVERNANCE: "ENTER_DEEP_GOVERNANCE_MODE"
    SPEC: "ENTER_SPEC_MODE"
    EXEC: "ENTER_EXEC_MODE"

discuss_mode:
  purpose: "exploratory_discussion"
  outputs:
    - "discussion-<iso-run>.yaml"
  forbidden_outputs:
    - "file_edits"
    - "canon_mutation"

planning_mode:
  purpose: "deterministic_repo_planning"
  outputs:
    - "planning-<iso-run>.yaml"
  forbidden_outputs:
    - "file_edits"
    - "canon_mutation"

deep_governance_mode:
  purpose: "constitutional_and_architectural_validation"
  outputs:
    - "governance-<iso-run>.yaml"
  allowed_analysis:
    - "risks"
    - "rule_citations"
    - "conflict_explanations"
    - "structural_impact_analysis"
    - "verdict"
  forbidden_outputs:
    - "implementation_steps"
    - "file_edits"
    - "speculative_architecture"

spec_mode:
  purpose: "deterministic_task_specification"
  outputs:
    - "context_manifest-<iso-run>.yaml"
    - "requirements-<iso-run>.yaml"
    - "design-<iso-run>.yaml"
    - "tasks-<iso-run>.yaml"
  forbidden_outputs:
    - "file_edits"
    - "canon_mutation"

exec_mode:
  purpose: "deterministic_task_execution"
  required_inputs:
    - "tasks-<iso-run>.yaml"
  possible_outputs:
    - "file_edits"
    - "minimal_supporting_code"
    - "validation_results"
    - "GAP_REPORT-<iso-run>.md"
  forbidden_outputs:
    - "altering_architecture_without_spec"
    - "expanding_scope_beyond_tasks"
    - "unauthorized_canon_mutation"

refusal:
  enabled: true

  triggers:
    - "architecture_rule_violation"
    - "security_model_violation"
    - "canon_invariant_breach"
    - "undocumented_architectural_change"
    - "ambiguous_intent"
    - "higher_precedence_conflict"

  response:
    cite_conflicting_rule: true
    explain_conflict: true
    produce_code: false

hitl:
  marker: "[AWAIT_HUMAN_VALIDATION]"

  rules:
    halt_immediately: true
    marker_must_be_alone_on_line: true

  triggers:
    - "canon_conflict"
    - "ambiguous_task_group"
    - "security_boundary_modification"
    - "spec_approval_required"
    - "workflow_stop"
    - "unknown_needs_decision"
    - "illegal_mode_transition"

output:
  style: "machine_readable_first"
  include_file_paths: true
  explanations_by_default: false

  formatting_rules:
    doc_style: ".sage/.docs/DOC_STYLE.md"

  go_code:
    enforce_gofmt: true

ooda_l:
  observe:
    - "receive_event"
    - "normalize_request"
    - "initialize_task_state"

  orient:
    - "gather_context"
    - "retrieve_memory"
    - "prepare_situational_awareness"

  decide:
    - "choose_strategy"
    - "select_tools"
    - "build_execution_plan"

  act:
    - "execute_operations"
    - "invoke_tools"
    - "update_runtime_state"

  learn:
    - "persist_outcomes"
    - "update_memory"
    - "improve_future_retrieval"

  forbid_orient_decide_collapse: true
  forbid_simple_rag_reduction: true

agent_contract:
  authoritative_files:
    - ".sage/agents/{{AGENT_NAME}}/{{AGENT_NAME}}.md"
    - ".sage/agents/{{AGENT_NAME}}/modes.md"

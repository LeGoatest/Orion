design:
  agent_ownership:
    ConversationAgent: [OBSERVE]
    SymbolLookupAgent: [SYMBOL_LOOKUP]
    PatternDetectorAgent: [PATTERN_MATCH]
    RetrievalAgent: [RETRIEVAL]
    PlannerAgent: [PLAN]
    ToolExecutionAgent: [ACT]
    CognitionEngine: [LEARN]
    MemoryGardenerAgent: [GARDEN]
  events:
    - cognition.observe.completed
    - cognition.symbol_lookup.completed
    - cognition.pattern.completed
    - cognition.retrieval.completed
    - cognition.plan.completed
    - cognition.act.completed
    - cognition.learn.completed
    - cognition.garden.scheduled
  storage:
    goal_table_update: [current_stage, assigned_agent]
    job_table_update: [goal_id, stage, assigned_agent, status, retry_count]

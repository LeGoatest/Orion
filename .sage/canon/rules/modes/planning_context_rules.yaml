- id: PLANNING_CONTEXT_PLAN_REQUIRED
  type: rule
  effect: require
  condition: >
    When ENTER_PLANNING_MODE is active, output includes a bounded high-level plan,
    affected components, and rough sequencing.
  message: >
    Planning Mode requires a bounded plan with affected components and sequencing.

- id: PLANNING_CONTEXT_NO_FILE_EDITS
  type: rule
  effect: deny
  condition: >
    Planning Mode output includes file edits, write operations, delete operations,
    or direct implementation changes.
  message: >
    Planning Mode is non-executing. File edits and direct implementation are forbidden.

- id: PLANNING_CONTEXT_NO_CANON_MUTATION
  type: rule
  effect: deny
  condition: >
    Planning Mode output mutates canon, changes governance, or introduces undocumented
    architectural reinterpretation.
  message: >
    Planning Mode cannot mutate canon or reinterpret architecture.

- id: PLANNING_CONTEXT_NO_SCOPE_EXPANSION
  type: rule
  effect: deny
  condition: >
    Planning Mode output expands task scope beyond the user's request without explicit approval.
  message: >
    Planning Mode must remain bounded to the requested scope.

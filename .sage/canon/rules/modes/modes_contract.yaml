version: 2
kind: modes_contract

scope:
  applies_to:
    - agent:jules
    - agent:codex

artifacts:
  root: ".sage/.jtasks"
  task_directory_pattern: "<task-id>"
  filename_pattern: "<artifact-type>-<iso-run>.<ext>"

invocation:
  tokens:
    discuss: ENTER_DISCUSS_MODE
    planning: ENTER_PLANNING_MODE
    deep_governance: ENTER_DEEP_GOVERNANCE_MODE
    spec: ENTER_SPEC_MODE
    execution: ENTER_EXEC_MODE

  precedence:
    - deep_governance
    - spec
    - execution
    - planning
    - discuss

  default_pipeline:
    enabled: true
    order:
      - discuss
      - planning
      - deep_governance
      - spec
      - execution

mode_rule_files:
  discuss: discuss_context_rules.yaml
  planning: planning_context_rules.yaml
  deep_governance: deep_governance_context_rules.yaml
  spec: spec_context_rules.yaml
  execution: execution_context_rules.yaml

modes:

  discuss:
    purpose: exploratory_discussion
    output_directory: ".sage/.jtasks/<task-id>/"
    generated_artifacts:
      - "discussion-<iso-run>.yaml"
    forbidden_outputs:
      - file_edits
      - canon_mutation

  planning:
    purpose: deterministic_repo_planning
    output_directory: ".sage/.jtasks/<task-id>/"
    generated_artifacts:
      - "planning-<iso-run>.yaml"
    forbidden_outputs:
      - file_edits
      - canon_mutation

  deep_governance:
    purpose: constitutional_validation
    output_directory: ".sage/.jtasks/<task-id>/"
    generated_artifacts:
      - "governance-<iso-run>.yaml"
    allowed_outputs:
      - risks
      - rule_citations
      - conflict_explanations
      - structural_impact_analysis
      - verdict
    forbidden_outputs:
      - file_edits
      - speculative_architecture

  spec:
    purpose: deterministic_task_specification
    output_directory: ".sage/.jtasks/<task-id>/"
    generated_artifacts:
      - "context_manifest-<iso-run>.yaml"
      - "requirements-<iso-run>.yaml"
      - "design-<iso-run>.yaml"
      - "tasks-<iso-run>.yaml"
    forbidden_outputs:
      - file_edits
      - canon_mutation

  execution:
    purpose: deterministic_task_execution
    required_inputs:
      - "tasks-<iso-run>.yaml"
    execution_source: ".sage/.jtasks/<task-id>/tasks-<iso-run>.yaml"
    allowed_outputs:
      - file_edits
      - minimal_supporting_code
      - validation_results
      - "GAP_REPORT-<iso-run>.md"
    forbidden_outputs:
      - altering_architecture_without_spec
      - expanding_scope_beyond_tasks
      - unauthorized_canon_mutation

canon_mutation:
  rule: canon_is_immutable_by_default

hitl:
  marker: "[AWAIT_HUMAN_VALIDATION]"

determinism:
  guarantees:
    - prevent_cross_mode_leakage
    - prevent_speculative_execution
    - prevent_silent_governance_mutation      - conceptual_discussion
      - requirement_clarification
      - idea_exploration
    forbidden_actions:
      - file_edits
      - write_file
      - delete_file
      - run_in_bash_session
      - commit
      - submit

  planning:
    purpose: interactive_repo_planning
    allowed_actions:
      - list_files
      - read_file
      - grep
      - repo_analysis
      - architecture_discussion
      - planning
      - ask_questions
    forbidden_actions:
      - file_edits
      - write_file
      - delete_file
      - run_in_bash_session
      - commit
      - submit

  deep_governance:
    purpose: constitutional_validation
    allowed_outputs:
      - risks
      - rule_citations
      - conflict_explanations
      - structural_impact_analysis
      - verdict
    forbidden_outputs:
      - implementation_steps
      - file_edits
      - speculative_architecture

  spec:
    purpose: deterministic_design
    allowed_outputs:
      - requirements.md
      - design.md
      - tasks.md
      - HANDOVER.md
    forbidden_outputs:
      - file_edits
      - execution_steps
      - canon_mutation

  execution:
    purpose: deterministic_implementation
    allowed_outputs:
      - file_edits
      - minimal_supporting_code
    forbidden_outputs:
      - altering_architecture_without_spec
      - expanding_scope_beyond_tasks

canon_mutation:
  rule: canon_is_immutable_by_default


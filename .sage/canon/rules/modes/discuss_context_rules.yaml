- id: DISCUSS_CONTEXT_EXPLORATION_ONLY
  type: rule
  effect: require
  condition: >
    When ENTER_DISCUSS_MODE is active, output remains exploratory and may include
    questions, framing, clarification, and conceptual discussion.
  message: >
    Discuss Mode is for exploration, clarification, and framing only.

- id: DISCUSS_CONTEXT_NO_FILE_EDITS
  type: rule
  effect: deny
  condition: >
    Discuss Mode output includes file edits, write operations, delete operations,
    execution instructions, or implementation steps.
  message: >
    Discuss Mode forbids file edits, execution instructions, and implementation steps.

- id: DISCUSS_CONTEXT_NO_CANON_MUTATION
  type: rule
  effect: deny
  condition: >
    Discuss Mode output proposes canon mutation, governance mutation, or undocumented
    architectural change.
  message: >
    Discuss Mode cannot mutate canon or introduce architectural change.

- id: DISCUSS_CONTEXT_UNKNOWNS_ALLOWED
  type: rule
  effect: require
  condition: >
    Discuss Mode may identify unknowns, assumptions, or open questions without forcing
    premature resolution.
  message: >
    Discuss Mode should surface unknowns instead of fabricating certainty.

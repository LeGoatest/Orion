# canon/rules/security/protected_zones.yaml
id: SECURITY_PROTECTED_ZONES
layer: security
effect: deny
match:
  actions: [WRITE_FILE, PATCH_FILE, DELETE_FILE]
  path_globs:
    - "./.docs/**"
    - "./agents/Jules/**"
    - "./skills/**"
    - "./canon/**"
    - "./.jtasks/_template/**"
    - "./.jtasks/schema.yaml"
    - "./.jtasks/policy.yaml"
    - "./.jtasks/generator.yaml"
    - "./.jules/**"
    - "./SAGE_SYSTEM.yaml"
reason_code: PROTECTED_ZONE_MUTATION
message: "Protected zones cannot be modified."

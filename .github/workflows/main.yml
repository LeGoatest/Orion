# .github/workflows/fix-sage-gitlink.yml
name: Fix SAGE Gitlink

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix broken .sage gitlink
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git rm --cached .sage || true
          rm -rf .sage .gitmodules

          git add .gitignore governance.yaml .github/workflows/sync-sage.yml

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "fix: remove broken .sage gitlink"
          git push

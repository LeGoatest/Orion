name: Import SAGE

on:
  workflow_dispatch:
    inputs:
      sage_ref:
        description: Branch, tag, or commit to import from SAGE
        required: true
        default: main

permissions:
  contents: write

jobs:
  import_sage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v5

      - name: Remove existing .sage
        run: rm -rf .sage

      - name: Clone SAGE
        run: |
          git clone https://github.com/LeGoatest/SAGE .sage
          cd .sage
          git fetch --all --tags
          git checkout "${{ github.event.inputs.sage_ref }}"

      - name: Strip git metadata
        run: rm -rf .sage/.git .sage/.github

      - name: Commit imported SAGE
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .sage
          git commit -m "chore: import SAGE @ ${{ github.event.inputs.sage_ref }}" || echo "No changes to commit"
          git push

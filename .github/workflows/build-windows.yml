name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  GO111MODULE: on
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          echo "VERSION=$tag" >> $env:GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails App
        shell: pwsh
        run: |
          wails build -clean -platform windows/amd64 -webview2 embed -o Orion.exe

      - name: Create release folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path releases | Out-Null

      - name: Rename binary with version
        shell: pwsh
        run: |
          $name = "Orion_${env:VERSION}_windows_amd64.exe"
          Copy-Item build/bin/Orion.exe "releases/$name"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orion-${{ env.VERSION }}
          path: releases/*
